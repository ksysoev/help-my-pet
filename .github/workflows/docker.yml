name: Build Docker image

on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf
        with:
          images: ghcr.io/${{ github.repository }}
      - name: Extract version from tag
        id: extract_version
        run: echo "VERSION=$(echo ${{ steps.meta.outputs.tags }} | cut -d ':' -f 2)" >> $GITHUB_ENV
      - name: Build and push Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          build-args: |
            VERSION=${{ env.VERSION }}
            BUILD=${{ github.sha }}

  deploy:
    needs: build-and-push
    if: github.ref_type == 'tag'
    uses: ksysoev/cloudlab/.github/workflows/deploy-service.yml@main
    with:
      environment_name: production
      docker_compose_file: deploy/docker-compose.yml
      service_name: helpmypet
      # Non-secret environment variables
      environment_vars: |
        {
          "VERSION": "${{ github.ref_name }}",
          "NETWORK_NAME": "helpmypet-network",
          "AI_MODEL": "claude-sonnet-4-6",
          "AI_MEDIA_MODEL": "claude-haiku-4-5",
          "AI_MAX_TOKENS": "16000",
          "RATE_LIMIT_USER_HOURLY_LIMIT": "5",
          "RATE_LIMIT_USER_DAILY_LIMIT": "15",
          "RATE_LIMIT_GLOBAL_DAILY_LIMIT": "4000"
        }
    secrets:
      # SSH connection parameters (reuse existing secret names)
      ssh_host: ${{ secrets.DO_HOST }}
      ssh_user: ${{ secrets.DO_USER }}
      ssh_key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
      # Deployment secrets (map existing secret names to container env vars)
      deployment_secrets: |
        {
          "BOT_TELEGRAM_TOKEN": "${{ secrets.TELEGRAM_TOKEN }}",
          "AI_API_KEY": "${{ secrets.ANTHROPIC_API_KEY }}"
        }
